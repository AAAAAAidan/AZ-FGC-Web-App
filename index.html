<!DOCTYPE html>
<html lang="en" dir="ltr" data-bs-theme="dark">
  <head>
    <!-- METADATA -->
    <title>Arizona Fighting Game Community</title>
    <meta charset="utf-8" />
    <meta name="description" content="A list of active groups and upcoming events in the Arizona fighting game community." />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- STYLES -->
    <!-- https://icons8.com/icon/If6dpkM4WkpE/grand-canyon - Grand Canyon icon by Icons8 -->
    <link rel="shortcut icon" type="image/ico" href="./images/icons8-grand-canyon-48.png" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" type="text/css" />
    <link rel="stylesheet" href="./index.css" type="text/css" />
  </head>
  <body class="bg-dark text-light">
    <main class="p-5 pb-0">
      <div class="row">
        <div class="col">
          <div class="profile-card border rounded text-body-secondary bg-body-secondary mb-4">
            <a
              href="#"
              onclick="javascript:window.open(atob(''), '_blank').focus();"
              class="link-light link-offset-2 link-underline-opacity-0 link-underline-opacity-100-hover"
            >
              <img src="./images/AZ 3rd Strike.webp" alt="AZ 3rd Strike server icon" class="profile-card-image" />
              <h3><img src="./images/Discord-Symbol-White.png" alt="Discord icon" class="icon-image" /> AZ 3rd Strike</h3>
            </a>
            <div>
              3rd Strike / Vampire Savior
            </div>
          </div>
        </div>
        <div class="col">
          <div class="profile-card border rounded text-body-secondary bg-body-secondary mb-4">
            <a
              href="#"
              onclick="javascript:window.open(atob(''), '_blank').focus();"
              class="link-light link-offset-2 link-underline-opacity-0 link-underline-opacity-100-hover"
            >
              <img src="./images/AZ Airdashers.webp" alt="AZ Airdashers server icon" class="profile-card-image" />
              <h3><img src="./images/Discord-Symbol-White.png" alt="Discord icon" class="icon-image" /> AZ Airdashers</h3>
            </a>
            <div>
              Guilty Gear / BlazBlue / misc.
            </div>
          </div>
        </div>
        <div class="col">
          <div class="profile-card border rounded text-body-secondary bg-body-secondary mb-4">
            <a
              href="#"
              onclick="javascript:window.open(atob(''), '_blank').focus();"
              class="link-light link-offset-2 link-underline-opacity-0 link-underline-opacity-100-hover"
            >
              <img src="./images/AZ Tekken.webp" alt="AZ Tekken server icon" class="profile-card-image" />
              <h3><img src="./images/Discord-Symbol-White.png" alt="Discord icon" class="icon-image" /> AZ Tekken</h3>
            </a>
            <div>
              Tekken 8
            </div>
          </div>
        </div>
        <div class="col">
          <div class="profile-card border rounded text-body-secondary bg-body-secondary mb-4">
            <a
              href="#"
              onclick="javascript:window.open(atob(''), '_blank').focus();"
              class="link-light link-offset-2 link-underline-opacity-0 link-underline-opacity-100-hover"
            >
              <img src="./images/Spiral Series.webp" alt="Spiral Series server icon" class="profile-card-image" />
              <h3><img src="./images/Discord-Symbol-White.png" alt="Discord icon" class="icon-image" /> Spiral Series</h3>
            </a>
            <div>
              Street Fighter 6
            </div>
          </div>
        </div>
      </div>
    </main>
    <iframe
      src="https://fgc-events.info/?countries=us&states=az&background=transparent"
      title="FGC Events Arizona"
      class="vh-100 w-100"
      loading="lazy"
      allowfullscreen
      allowtransparency="true"
    ></iframe>
  </body>
</html>
